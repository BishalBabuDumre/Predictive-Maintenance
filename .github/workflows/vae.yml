name: Variational Auto-Encoder
on:
  workflow_dispatch: # Allows to run it manually for testing

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_training.txt

      - name: Run Python script
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        run: |
          python -m training.vae

      - name: Commit and Push Trained Assets
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Track both your fresh scaler and the self-contained ONNX model
          git add .gitattributes
          git add data/model/scaler_x.pkl data/model/vae_model.onnx
          
          # Only commit if something actually changed; [skip ci] prevents an infinite build loop
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update trained VAE model and scaler [skip ci]" && git push)
