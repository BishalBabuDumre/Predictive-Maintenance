name: Variational Auto-Encoder
on:
  workflow_dispatch: # Allows to run it manually for testing

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_training.txt

      - name: Run Python script
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        run: |
          python -m training.vae

      - name: Commit and Push trained ONNX model
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
  
          # 1. Force Git to explicitly read your .gitattributes and treat the ONNX as binary
          git add .gitattributes
          git add --renormalize data/model/vae_model.onnx
  
          # 2. Check if there are actually any changes to commit
          if ! git diff --cached --quiet; then
            echo "Changes detected in the model. Committing and pushing..."
            git commit -m "chore: update trained VAE model weights [skip ci]"
            git push origin HEAD:${{ github.ref }}
          else
            echo "No changes detected in the model file. Skipping push."
          fi
